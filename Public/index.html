:root{

    --bg:#050806;

    --bg2:#0A1310;

    --panel:rgba(12,18,15,.68);

    --panel2:rgba(18,28,22,.82);

    --green:#35C26B;

    --green2:#79F0A8;

    --greenGlow:rgba(53,194,107,.28);

    --brown:#8A5D35;

    --brownGlow:rgba(138,93,53,.25);

    --text:#F4F8F5;

    --sub:#93A39B;

    --danger:#D84E4E;

    --warning:#D9A83B;

    --radius:18px;

}

*{

margin:0;

padding:0;

box-sizing:border-box;

}

html{

width:100%;

height:100%;

scroll-behavior:smooth;

}

body{

width:100%;

height:100dvh;

overflow:hidden;

font-family:'Inter',sans-serif;

background:

radial-gradient(circle at top,var(--greenGlow),transparent 35%),

linear-gradient(180deg,var(--bg),var(--bg2));

color:var(--text);

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

body::before{

content:"";

position:absolute;

inset:0;

background-image:

linear-gradient(rgba(53,194,107,.03) 1px,transparent 1px),

linear-gradient(90deg,rgba(53,194,107,.03) 1px,transparent 1px);

background-size:42px 42px;

pointer-events:none;

}

body::after{

content:"";

position:absolute;

width:900px;

height:900px;

border-radius:50%;

background:radial-gradient(circle,var(--greenGlow),transparent 70%);

filter:blur(100px);

opacity:.25;

animation:pulseGlow 8s infinite alternate;

}

@keyframes pulseGlow{

0%{

transform:scale(1);

opacity:.18;

}

100%{

transform:scale(1.25);

opacity:.35;

}

}

.boot{

}

.boot-terminal{

height:150px;

overflow:hidden;

font-size:11px;

color:var(--green2);

background:#07110C;

padding:14px;

border-radius:10px;

border:1px solid rgba(53,194,107,.15);

}

.boot-progress{

margin-top:18px;

height:5px;

background:#101A16;

border-radius:30px;

overflow:hidden;

}

.boot-fill{

width:0%;

height:100%;

background:linear-gradient(90deg,var(--green),var(--green2));

box-shadow:0 0 20px var(--greenGlow);

transition:width .2s linear;

}

.boot-status{

margin-top:10px;

display:flex;

justify-content:space-between;

font-size:11px;

font-family:monospace;

color:var(--sub);

}

.boot-button{

margin-top:25px;

width:100%;

padding:15px;

background:transparent;

border:1px solid var(--green);

border-radius:12px;

font-family:'Orbitron',sans-serif;

letter-spacing:2px;

font-size:12px;

color:var(--green);

cursor:pointer;

transition:.25s;

}

.boot-button:hover{

background:var(--green);

color:#07110C;

box-shadow:0 0 25px var(--greenGlow);

}

<script>

const fecha=document.getElementById("fecha");

const hora=document.getElementById("hora");

function actualizarReloj(){

    const ahora=new Date();

    fecha.textContent=ahora.toLocaleDateString("es-ES",{

        day:"2-digit",

        month:"long",

        year:"numeric"

    });

    hora.textContent=ahora.toLocaleTimeString("es-ES",{

        hour:"2-digit",

        minute:"2-digit",

        second:"2-digit"

    });

}

setInterval(actualizarReloj,1000);

actualizarReloj();

const boot=document.getElementById("boot");

const boton=document.getElementById("bootButton");

const barra=document.getElementById("bootFill");

const porcentaje=document.getElementById("bootPercent");

const texto=document.getElementById("bootText");

const terminal=document.getElementById("terminal");

const mensajes=[

"> Verificando integridad del sistema... OK",

"> Inicializando protocolo táctico... OK",

"> Conectando Centro de Operaciones... OK",

"> Sincronizando reloj del servidor... OK",

"> Cargando módulos de autenticación... OK",

"> Activando interfaz MADERA... OK",

"> Sistema listo."

];

boton.addEventListener("click",()=>{

    boton.disabled=true;

    boton.textContent="CARGANDO...";

    let progreso=0;

    let indice=0;

    const intervalo=setInterval(()=>{

        progreso++;

        barra.style.width=progreso+"%";

        porcentaje.textContent=progreso+"%";

        if(

            progreso%14===0 &&

            indice<mensajes.length

        ){

            terminal.innerHTML+=

            "<br>"+mensajes[indice];

            terminal.scrollTop=

            terminal.scrollHeight;

            indice++;

        }

        if(progreso>=100){

            clearInterval(intervalo);

            texto.textContent="ACCESO CONCEDIDO";

            setTimeout(()=>{

                boot.style.opacity="0";

                boot.style.visibility="hidden";

                boot.style.pointerEvents="none";

            },600);

        }

    },28);

});

document.querySelectorAll(".btn").forEach(btn=>{

    btn.addEventListener("mouseenter",()=>{

        btn.style.transform="translateY(-4px)";

    });

    btn.addEventListener("mouseleave",()=>{

        btn.style.transform="translateY(0px)";

    });

});

window.addEventListener("contextmenu",e=>{

    e.preventDefault();

});

window.addEventListener("keydown",e=>{

    if(

        e.key==="F12" ||

        (e.ctrlKey && e.shiftKey && e.key==="I") ||

        (e.ctrlKey && e.shiftKey && e.key==="J") ||

        (e.ctrlKey && e.key==="U")

    ){

        e.preventDefault();

    }

});

</script>
