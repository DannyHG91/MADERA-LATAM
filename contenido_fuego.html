<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Forzado de escala estricto para evitar zoom táctil y fijar vista móvil tipo App nativa vertical -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MACROS DE LA UNIDAD COBRA</title>

    <style>
    :root {
        --stealth-dark: #020407; /* Negro absoluto del búnker principal */
        --glass-core: rgba(11, 17, 13, 0.75); /* Cristal ahumado verdoso de alta tecnología */
        --cobra-bronce: #a48253;            /* Oro viejo / Bronce del emblema */
        --cobra-bronce-brillante: #d4af37;  /* Oro brillante para efectos activos */
        --cobra-hover: rgba(164, 130, 83, 0.15); /* Brillo bronce al presionar */
        --borde-tactico: rgba(164, 130, 83, 0.25); /* Bordes de cristal ligeros */
        --laser-cyan: #00d9ff;
        --sub-slate: #56687a;
        --pure-light: #f1f5f9;
        --grid-line: rgba(164, 130, 83, 0.015);
    }

    /* INGENIERÍA DE PANTALLA COMPLETA VERTICAL ABSOLUTA EN MÓVILES (60 FPS NO-LAG) */
    html, body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Corta desplazamientos o rebotes elásticos fuera de foco */
        background-color: var(--stealth-dark);
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        touch-action: none; /* Inmoviliza el scroll elástico de iOS y tirones de Android */
        position: relative;
        
        /* Blindaje total contra resaltar texto de forma accidental */
        -webkit-user-select: none;
        user-select: none;
    }
    /* FORZADO DE RENDERIZADO POR HARDWARE DE GPU (ELIMINA TIRONES EN MÓVILES) */
    .system-boot-screen, .mainframe-container, .parrafo, .boot-progress-fill {
        -webkit-transform: translateZ(0);
        transform: translateZ(0);
        will-change: transform, opacity;
    }

    /* PANTALLA DE CARGA DE FACCIÓN CON MARCOS DE BRONCE TÁCTICO */
    .system-boot-screen {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: var(--stealth-dark);
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
    }

    .boot-box {
        width: 86vw;
        max-width: 360px;
        background: rgba(11, 17, 13, 0.9); /* Removido blur pesado por fondo sólido ultraligero */
        border: 1px solid rgba(164, 130, 83, 0.25);
        padding: 25px 20px;
        position: relative;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
    }

    /* Esquinas de la precarga en Bronce */
    .boot-corner {
        position: absolute;
        width: 10px; height: 10px;
        border: 2px solid var(--cobra-bronce);
    }
    .b-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .b-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .b-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .b-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }
        .boot-terminal {
        width: 100%;
        font-family: monospace;
        font-size: 11px;
        color: var(--cobra-bronce-brillante);
        text-align: left;
        margin-bottom: 25px;
        line-height: 1.6;
        letter-spacing: 1px;
        height: 110px;
        overflow: hidden;
        display: none; /* Se revela tras presionar sincronizar */
    }

    /* Botón de activación mandatorio de enlace */
    .btn-boot-start {
        padding: 16px 24px;
        background: linear-gradient(135deg, rgba(164, 130, 83, 0.03), rgba(164, 130, 83, 0.08));
        border: 1px solid var(--cobra-bronce);
        color: var(--cobra-bronce-brillante);
        font-family: monospace;
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 2px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(164, 130, 83, 0.1);
        transition: all 0.2s ease;
        margin: 20px 0;
        -webkit-tap-highlight-color: transparent;
    }
    .btn-boot-start:active {
        background: var(--cobra-bronce);
        color: #000;
        box-shadow: 0 0 25px var(--cobra-bronce);
    }

    .boot-meta-status {
        display: none;
        justify-content: space-between;
        align-items: center;
        font-family: monospace;
        font-size: 10px;
        color: var(--sub-slate);
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    .boot-progress-bar {
        display: none;
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(164, 130, 83, 0.15);
        position: relative;
        overflow: hidden;
    }

    .boot-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--cobra-bronce-brillante), #fff);
        box-shadow: 0 0 10px var(--cobra-bronce-brillante);
    }

    /* FONDO RECOPLILADO: Rejilla modular nativa de alta fluidez (Sin imágenes pesadas) */
    .dynamic-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(var(--grid-line) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 50px 50px;
        background-position: center;
        z-index: 1;
    }
        /* FONDO DE TEXTURA 2: Círculos concéntricos con pulso suave de radar */
    .radar-wave-hub {
        position: absolute;
        width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        z-index: 2;
        pointer-events: none;
    }

    .wave {
        position: absolute;
        border: 1px solid rgba(164, 130, 83, 0.05);
        border-radius: 50%;
        animation: node-pulse 8s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
        opacity: 0;
    }
    .w1 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 0s; }
    .w2 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 2.5s; }
    .w3 { width: 80vw; height: 80vw; max-width: 320px; max-height: 320px; animation-delay: 5s; }

    @keyframes node-pulse {
        0% { transform: scale(0.6); opacity: 0; }
        15% { opacity: 1; }
        100% { transform: scale(3.5); opacity: 0; border-color: rgba(164, 130, 83, 0.01); }
    }

    /* CONSOLA CENTRAL COMPRIMIDA EN VERTICAL FLUIDA */
    .mainframe-container {
        background: #090e0b; 
        border: 1px solid rgba(164, 130, 83, 0.2);
        padding: 20px 18px;
        width: 88vw;
        max-width: 420px;
        max-height: 85vh; 
        box-sizing: border-box;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        position: relative;
        z-index: 5;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* CORREDOR LÁSER PERIMETRAL EN BRONCE */
    .laser-border {
        position: absolute;
        background: linear-gradient(90deg, transparent, var(--cobra-bronce), transparent);
        z-index: 6;
    }
    .lb-top { top: 0; left: -100%; width: 100%; height: 1px; animation: laser-h 4.5s infinite linear; }
    .lb-bottom { bottom: 0; right: -100%; width: 100%; height: 1px; animation: laser-h-rev 4.5s infinite linear; }
    
    @keyframes laser-h { 0% { left: -100%; } 100% { left: 100%; } }
    @keyframes laser-h-rev { 0% { right: -100%; } 100% { right: 100%; } }

    /* Esquinas Fijas con Ángulos de Titanio */
    .corner-bracket {
        position: absolute;
        width: 14px; height: 14px;
        border: 2px solid rgba(164, 130, 83, 0.3);
        z-index: 7;
    }
    .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }
        /* CONTENEDOR DE LA PORTADA REAJUSTADO */
    .portada-container {
        width: 100%;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    .portada-imagen {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid var(--cobra-bronce);
        border-radius: 2px;
    }

    /* CONTENEDOR PRINCIPAL FLUIDO CON SCROLL ACELERADO */
    .contenedor {
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow-y: auto; 
        -webkit-overflow-scrolling: touch; /* Scroll fluido nativo */
        max-height: 45vh;
        padding-right: 2px;
        box-sizing: border-box;
    }

    /* BLOQUES DE MACROS OPTIMIZADOS (RESPUESTA INSTANTÁNEA 60FPS) */
    .parrafo {
        background: rgba(164, 130, 83, 0.04); 
        border-left: 4px solid var(--cobra-bronce); 
        border-top: 1px solid var(--borde-tactico);
        border-right: 1px solid var(--borde-tactico);
        border-bottom: 1px solid var(--borde-tactico);
        padding: 14px 12px;
        margin: 6px 0;
        cursor: pointer;
        font-size: 11px;
        font-family: monospace;
        letter-spacing: 0.5px;
        clip-path: polygon(0% 0%, 95% 0%, 100% 18%, 100% 100%, 5% 100%, 0% 82%);
        box-sizing: border-box;
        
        /* Transición de hardware lineal directa para evitar saltos gráficos */
        transition: background-color 0.1s linear, border-color 0.1s linear;
        -webkit-tap-highlight-color: transparent;
    }

    /* Estado de presión táctil física inmediata */
    .parrafo:active {
        background-color: rgba(164, 130, 83, 0.18);
        border-color: var(--cobra-bronce-brillante);
    }

    /* Resaltado veloz inyectado por JS tras copiar */
    .copiado {
        background-color: var(--cobra-bronce) !important;
        border-color: #ffffff !important;
        color: #000000 !important; 
        font-weight: bold !important;
    }

    /* BOTÓN DE DESCONEXIÓN SEGURO EN ROJO MILITAR */
    .btn-exit {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: rgba(255, 74, 74, 0.02);
        border: 1px dashed rgba(255, 74, 74, 0.25);
        color: #ff4a4a;
        text-align: center;
        text-decoration: none;
        font-size: 10px;
        font-family: monospace;
        font-weight: 600;
        letter-spacing: 2px;
        box-sizing: border-box;
        border-radius: 2px;
        transition: background-color 0.15s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .btn-exit:active {
        background-color: rgba(255, 74, 74, 0.12);
    }

    footer {
        text-align: center;
        padding-top: 12px;
        font-size: 9px;
        color: var(--cobra-bronce-brillante);
        opacity: 0.6;
        font-family: monospace;
        letter-spacing: 1px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    * {
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
    }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO DE FACCIÓN CON PORCENTAJE NUMÉRICO (SESIÓN ÚNICA) -->
    <div class="system-boot-screen" id="bootScreen">
        <div class="boot-box" id="bootBox">
            <div class="boot-corner b-tl"></div>
            <div class="boot-corner b-tr"></div>
            <div class="boot-corner b-bl"></div>
            <div class="boot-corner b-br"></div>
            
            <button class="btn-boot-start" id="btnStartBoot">[ SINCRONIZAR TERMINAL COBRA ]</button>

            <div class="boot-terminal" id="bootTerminal">
                >> CONECTANDO CON EL ARCHIVO DIVISIONAL...<br>
                >> CARGANDO BANCO DE DATOS SELECTIVO...
            </div>
            
            <div class="boot-meta-status" id="bootMetaStatus">
                <span>ESTADO: DESENCRIPTANDO MACROS</span>
                <span id="bootPercent">0%</span>
            </div>
            
            <div class="boot-progress-bar" id="bootProgressBar">
                <div class="boot-progress-fill" id="bootProgressFill"></div>
            </div>
        </div>
    </div>

    <!-- Red de blindaje de fondo vectorizada -->
    <div class="dynamic-bg"></div>
    <div class="radar-wave-hub">
        <div class="wave w1"></div>
        <div class="wave w2"></div>
        <div class="wave w3"></div>
    </div>

    <div class="mainframe-container">
        <!-- Haz de luz perimetral animado -->
        <div class="laser-border lb-top"></div>
        <div class="laser-border lb-bottom"></div>

        <!-- Ángulos de titanio fijados -->
        <div class="corner-bracket tl"></div>
        <div class="corner-bracket tr"></div>
        <div class="corner-bracket bl"></div>
        <div class="corner-bracket br"></div>

        <!-- Encabezado de Portada Cobra Centralizado -->
        <div class="portada-container">
            <img src="titulo-cobra.png" alt="Logotipo Grupo Militar Cobra" class="portada-imagen">
        </div>

        <!-- Bloque de Comandos de Chat Saneados (Macros) -->
        <div class="contenedor">
            <div class="parrafo">/flobby GRUPO COBRA TODOS A PUNTO DE ENCUENTRO.</div>
        </div>

        <!-- Botón Táctico de Retorno Seguro -->
        <a href="/logout" class="btn-exit" id="btnDisconnect">[ CERRAR ENLACE SEGURO ]</a>

        <footer>
            Sistema de macros tácticos | Toque para copiar
        </footer>
    </div>
        <!-- INGENIERÍA CONTROLADORA DE LOGS, PORTAPAPELES Y AUDIO SINTÉTICO -->
    <script>
        let audioCtx = null;
        let radarInterval = null;

        const logs = [
            ">> COMPROBANDO INTEGRIDAD DEL ENLACE... OK",
            ">> SINTETIZANDO OSCILADORES PROTEGIDOS... OK",
            ">> DESENCRIPTANDO MACROS OPERATIVOS...",
            ">> CARGANDO ARCHIVO: REGLAS DE CHATS... OK",
            ">> PROTOCOLOS DE ACCESO EN VERTICAL COMPLETA...",
            ">> ESTABLECIENDO CONEXIÓN SEGURA CON TERMINAL."
        ];

        // CONTROL PERSISTENTE DE INTRO DE SESIÓN (EVITA REPETICIONES)
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('cmm_bunker_reglas_inicializado') === 'true') {
                const bootScreen = document.getElementById("bootScreen");
                bootScreen.style.transition = "none";
                bootScreen.style.opacity = "0";
                bootScreen.style.visibility = "hidden";
                initAudio();
            }
        });

        // DESBLOQUEO DE HARDWARE DE AUDIO TÁCTIL (REQUISITO MÓVIL)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!radarInterval) {
                playRadarPing(); 
                radarInterval = setInterval(playRadarPing, 4000); 
            }
        }

        // Tono 1: Pitido seco de log de carga (1050Hz)
        function playLogBeep() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1050, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        // Tono 2: Sincronización al 100% exitosa
        function playSystemReadySound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(560, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.8);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        // Tono 3: Clic de copia rápida (Pulso metálico de frecuencia entrelazada sin lag)
        function playCopySound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1350, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        // Tono 4: Desconexión segura descendente
        function playDisconnectSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.14);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.14);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.14);
        }

        // CONTROLADOR DE ACCIONAMIENTO DE ARRANQUE CON AUDIO SINK
        document.getElementById('btnStartBoot').addEventListener('click', function() {
            initAudio();
            this.style.display = "none";
            document.getElementById("bootTerminal").style.display = "block";
            document.getElementById("bootMetaStatus").style.display = "flex";
            document.getElementById("bootProgressBar").style.display = "block";

            let logIndex = 0;
            const terminal = document.getElementById("bootTerminal");
            const percentText = document.getElementById("bootPercent");
            const progressFill = document.getElementById("bootProgressFill");
            
            const logInterval = setInterval(() => {
                if (logIndex < logs.length) {
                    terminal.innerHTML += `<br>${logs[logIndex]}`;
                    playLogBeep(); 
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                }
            }, 380);

            let currentPercent = 0;
            const duration = 2600; 
            const stepTime = duration / 100;

            const countInterval = setInterval(() => {
                if (currentPercent < 100) {
                    currentPercent++;
                    percentText.innerText = `${currentPercent}%`;
                    progressFill.style.width = `${currentPercent}%`;
                } else {
                    clearInterval(countInterval);
                    playSystemReadySound();
                }
            }, stepTime);

            setTimeout(() => {
                const bootScreen = document.getElementById("bootScreen");
                bootScreen.style.opacity = "0";
                setTimeout(() => {
                    bootScreen.style.visibility = "hidden";
                    sessionStorage.setItem('cmm_bunker_reglas_inicializado', 'true');
                    if (!radarInterval) {
                        playRadarPing(); 
                        radarInterval = setInterval(playRadarPing, 4000); 
                    }
                }, 600);
            }, duration + 200);
        });

        // Loop de Radar Furtivo Ambiental (Tono subgrave bronce profundo)
        function playRadarPing() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(135, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(65, audioCtx.currentTime + 1.6);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.8);
            } catch (err) {}
        }

        // LÓGICA ULTRA FLUDA DE COPIA RÁPIDA SANEADA (CERO BASURA PARA ONESTATE)
        const parrafos = document.querySelectorAll('.parrafo');

        parrafos.forEach(p => {
            p.addEventListener('click', () => {
                initAudio();
                playCopySound(); 
                const textoLimpio = p.innerText.trim(); // Rastrilla y elimina saltos de línea ocultos
                
                navigator.clipboard.writeText(textoLimpio).then(() => {
                    p.classList.add('copiado');
                    // Retraso optimizado a 150ms para máxima fluidez y velocidad bajo el dedo
                    setTimeout(() => { p.classList.remove('copiado'); }, 150); 
                }).catch(err => {
                    console.error('Falla al transferir al portapapeles: ', err);
                });
            });
        });

        // DESCONEXIÓN CON RETRASO DE HARDWARE SÓNICO
        document.getElementById('btnDisconnect').addEventListener('click', function(e) {
            e.preventDefault();
            const destinationUrl = this.getAttribute('href');
            playDisconnectSound();
            setTimeout(() => { window.location.href = destinationUrl; }, 130);
        });

        document.body.addEventListener('touchstart', initAudio, {passive: true});
        document.body.addEventListener('click', initAudio);
    </script>
</body>
</html>
